<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Permissions-Policy" content="geolocation=(self)" />
<title>気温年輪帳 | Weather Almanac</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root {
    --ink: #12161C;
    --surface: #1B212B;
    --surface-alt: #232B37;
    --line: #333D4B;
    --paper: #EDEAE2;
    --muted: #8A93A3;
    --ember: #E3A23C;
    --frost: #5B8FB0;
    --tan: #C9BFA5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    padding: 28px 20px 48px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; color: var(--ember); margin-bottom: 8px;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: clamp(28px, 5vw, 40px); margin: 0 0 8px;
  }
  .sub { color: var(--muted); font-size: 14.5px; line-height: 1.6; margin: 0 0 22px; max-width: 480px; }

  .loc-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .primary-btn {
    background: var(--ember); border: none; color: var(--ink);
    border-radius: 8px; padding: 9px 16px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .loc-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .city-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .city-btn {
    background: var(--surface-alt); border: 1px solid var(--line); color: var(--paper);
    border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .city-btn.active { border-color: var(--ember); color: var(--ember); }
  details { font-size: 13px; margin-bottom: 6px; }
  summary { color: var(--muted); cursor: pointer; }
  .manual-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .manual-input {
    background: var(--surface); border: 1px solid var(--line); color: var(--paper);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 140px; font-family: 'IBM Plex Mono', monospace;
  }
  .hint { font-size: 12px; color: #5C6674; margin: 6px 0 0; }
  .years-row { display: flex; align-items: center; gap: 10px; margin: 4px 0 18px; }
  .years-label { font-size: 12.5px; color: var(--muted); }
  .years-btn {
    background: var(--surface-alt); border: 1px solid var(--line); color: var(--paper);
    border-radius: 6px; padding: 5px 12px; font-size: 12.5px; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .years-btn.active { background: var(--ember); border-color: var(--ember); color: var(--ink); font-weight: 600; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; margin-top: 20px; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
  .nav-btn {
    background: transparent; border: 1px solid var(--line); color: var(--paper);
    border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 14px;
  }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .week-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
  .week-label { text-align: center; font-size: 11.5px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); }
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-cell {
    aspect-ratio: 1; background: transparent; border: 1px solid transparent; color: var(--paper);
    border-radius: 8px; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace; cursor: pointer;
  }
  .day-cell:hover { background: var(--surface-alt); }
  .day-cell.today { border-color: var(--ember); color: var(--ember); }
  .day-cell.selected { background: var(--ember); color: var(--ink); font-weight: 600; }
  .footnote { color: #5C6674; font-size: 11px; margin-top: 14px; }

  .placeholder { min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; }
  .placeholder-ring { width: 64px; height: 64px; border-radius: 50%; border: 2px dashed var(--line); }
  .placeholder-text { color: var(--muted); font-size: 13.5px; line-height: 1.7; }

  .result-header { margin-bottom: 12px; }
  .result-date { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .result-sub { color: var(--muted); font-size: 12.5px; margin-left: 6px; }
  .tab-row { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab-btn {
    flex: 1; background: var(--surface-alt); border: 1px solid var(--line); color: var(--muted);
    border-radius: 7px; padding: 7px 4px; font-size: 12.5px; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .tab-btn.active { background: var(--ember); border-color: var(--ember); color: var(--ink); font-weight: 600; }
  .legend { display: flex; flex-direction: column; gap: 8px; }
  .baseline-note { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .legend-row {
    display: flex; flex-direction: column; gap: 4px; font-size: 13px;
    background: var(--surface-alt); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px;
  }
  .legend-row-main { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .legend-year { font-family: 'IBM Plex Mono', monospace; width: 90px; flex-shrink: 0; font-weight: 500; }
  .legend-vals { color: var(--muted); flex: 1; }
  .legend-diff { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .legend-sub { color: #6E7889; font-size: 11.5px; padding-left: 24px; }
  .legend-unavail { color: #6B5648; font-style: italic; }

  .chart-wrap { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; }
  .bar-legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--muted); margin-top: 8px; justify-content: center; }
  .bar-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .bar-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  button:focus-visible, .day-cell:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">WEATHER ALMANAC</div>
  <h1>気温くらべ帳</h1>
  <p class="sub">日付をひとつ選ぶと、今年から過去4年分の気温を「日ごと・週平均・月平均」で比較できます。</p>

  <div class="loc-row">
    <button class="primary-btn" id="geoBtn">📍 現在地を使う</button>
    <span class="loc-text" id="locStatusText"></span>
  </div>
  <div class="city-row" id="cityRow"></div>
  <details>
    <summary>緯度・経度を直接指定する</summary>
    <div class="manual-row">
      <input class="manual-input" id="manualLat" placeholder="緯度 例: 35.68">
      <input class="manual-input" id="manualLon" placeholder="経度 例: 139.76">
      <button class="city-btn" id="manualBtn">座標を設定</button>
    </div>
  </details>
  <p class="hint" id="locHint">※ 上のいずれかで地点を決めると、日付を選んだときに気温が表示されます。</p>

  <div class="years-row">
    <span class="years-label">比較する年数:</span>
    <button class="years-btn active" id="years5">過去5年</button>
    <button class="years-btn" id="years10">過去10年</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="cal-header">
        <button class="nav-btn" id="prevMonth">←</button>
        <span class="cal-title" id="calTitle"></span>
        <button class="nav-btn" id="nextMonth">→</button>
      </div>
      <div class="week-row" id="weekRow"></div>
      <div class="day-grid" id="dayGrid"></div>
      <p class="footnote">データ: Open-Meteo.com（CC BY 4.0）</p>
    </div>

    <div class="card" id="resultCard">
      <div class="placeholder">
        <div class="placeholder-ring"></div>
        <p class="placeholder-text">左のカレンダーから日付を選ぶと、<br>気温の比較が表示されます。</p>
      </div>
    </div>
  </div>
</div>

<script>
const EMBER = "#E3A23C", FROST = "#5B8FB0", TAN = "#C9BFA5", INK = "#12161C", PAPER = "#EDEAE2", MUTED = "#8A93A3", LINE = "#333D4B";
const WEEKDAYS = ["日","月","火","水","木","金","土"];
const MONTHS_JA = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const PRESET_CITIES = [
  { label: "東京", lat: 35.6812, lon: 139.7671 },
  { label: "名古屋", lat: 35.1815, lon: 136.9066 },
  { label: "大阪", lat: 34.6937, lon: 135.5023 },
  { label: "札幌", lat: 43.0621, lon: 141.3544 },
  { label: "福岡", lat: 33.5904, lon: 130.4017 },
  { label: "那覇", lat: 26.2124, lon: 127.6809 },
];

const today = new Date(); today.setHours(0,0,0,0);
const currentYear = today.getFullYear();
let viewMonth = today.getMonth();
let selectedDay = null;
let userLoc = null;
let placeName = "";
let currentTab = "day";
let dataCache = {};
let yearsBack = 5;

function pad(n){ return String(n).padStart(2,"0"); }
function dateStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }

function tempToColor(t, dMin, dMax){
  if (t == null || Number.isNaN(t)) return "#3A4250";
  const c = Math.min(Math.max(t, dMin), dMax);
  const ratio = (c - dMin) / ((dMax - dMin) || 1);
  const c1 = [0x5b,0x8f,0xb0], c2 = [0xe3,0xa2,0x3c];
  const rgb = c1.map((v,i)=>Math.round(v + (c2[i]-v)*ratio));
  return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
}

async function fetchDaily(url){
  const res = await fetch(url);
  if (!res.ok) throw new Error("network:" + res.status);
  return res.json();
}

async function getYearRecord(year, month, day, lat, lon){
  const ds = dateStr(year, month, day);
  const target = new Date(ds + "T00:00:00");
  const diffDays = Math.round((target - today) / 86400000);
  const params = "temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum,relative_humidity_2m_mean";
  try {
    if (diffDays > 16) return { year, available:false, reason:"future" };
    if (diffDays > -6) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&start_date=${ds}&end_date=${ds}&daily=${params}&timezone=auto`;
      const data = await fetchDaily(url);
      const max = data?.daily?.temperature_2m_max?.[0];
      const min = data?.daily?.temperature_2m_min?.[0];
      const mean = data?.daily?.temperature_2m_mean?.[0];
      const precip = data?.daily?.precipitation_sum?.[0];
      const humidity = data?.daily?.relative_humidity_2m_mean?.[0];
      if (max == null) throw new Error("no data");
      return { year, available:true, max, min, mean, precip, humidity };
    }
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${ds}&end_date=${ds}&daily=${params}&timezone=auto`;
    const data = await fetchDaily(url);
    const max = data?.daily?.temperature_2m_max?.[0];
    const min = data?.daily?.temperature_2m_min?.[0];
    const mean = data?.daily?.temperature_2m_mean?.[0];
    const precip = data?.daily?.precipitation_sum?.[0];
    const humidity = data?.daily?.relative_humidity_2m_mean?.[0];
    if (max == null) throw new Error("no data");
    return { year, available:true, max, min, mean, precip, humidity };
  } catch(e){
    return { year, available:false, reason:"error", detail: String(e.message||e) };
  }
}

async function getRangeRecord(year, startStr, endStr, lat, lon){
  const endDate = new Date(endStr + "T00:00:00");
  const diffDays = Math.round((endDate - today) / 86400000);
  const params = "temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum,relative_humidity_2m_mean";
  const base = diffDays > -6
    ? "https://api.open-meteo.com/v1/forecast"
    : "https://archive-api.open-meteo.com/v1/archive";
  try {
    const url = `${base}?latitude=${lat}&longitude=${lon}&start_date=${startStr}&end_date=${endStr}&daily=${params}&timezone=auto`;
    const data = await fetchDaily(url);
    const maxes = (data?.daily?.temperature_2m_max || []).filter(v => v != null);
    const mins = (data?.daily?.temperature_2m_min || []).filter(v => v != null);
    const means = (data?.daily?.temperature_2m_mean || []).filter(v => v != null);
    const precips = (data?.daily?.precipitation_sum || []).filter(v => v != null);
    const humids = (data?.daily?.relative_humidity_2m_mean || []).filter(v => v != null);
    if (!maxes.length || !mins.length || !means.length) {
      return { year, available: false, reason: diffDays > 16 ? "future" : "error" };
    }
    const max = Math.max(...maxes);
    const min = Math.min(...mins);
    const mean = means.reduce((a, b) => a + b, 0) / means.length;
    const precip = precips.length ? precips.reduce((a,b) => a+b, 0) : null;
    const humidity = humids.length ? humids.reduce((a,b) => a+b, 0) / humids.length : null;
    return { year, available: true, max, min, mean, precip, humidity };
  } catch (e) {
    return { year, available: false, reason: "error" };
  }
}

function weekRangeFor(year, month, day){
  const d = new Date(year, month, day);
  const dow = d.getDay();
  const start = new Date(d); start.setDate(d.getDate() - dow);
  const end = new Date(d); end.setDate(d.getDate() + (6 - dow));
  return {
    start: dateStr(start.getFullYear(), start.getMonth(), start.getDate()),
    end: dateStr(end.getFullYear(), end.getMonth(), end.getDate()),
    startObj: start, endObj: end,
  };
}

function monthRangeFor(year, month){
  return {
    start: dateStr(year, month, 1),
    end: dateStr(year, month, daysInMonth(year, month)),
  };
}

async function reverseGeocode(lat, lon){
  try {
    const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ja`);
    const data = await res.json();
    placeName = data.city || data.locality || data.principalSubdivision || "選択した地点";
  } catch { placeName = "選択した地点"; }
  renderLocStatus();
}

function renderLocStatus(){
  const el = document.getElementById("locStatusText");
  if (userLoc) el.textContent = "📍 " + placeName;
  else el.textContent = "";
  document.getElementById("locHint").style.display = userLoc ? "none" : "block";
}

document.getElementById("geoBtn").addEventListener("click", () => {
  const statusEl = document.getElementById("locStatusText");
  if (!navigator.geolocation) {
    statusEl.textContent = "このブラウザは位置情報に対応していません。下から選んでください。";
    return;
  }
  statusEl.textContent = "位置情報の許可ダイアログを確認してください…";
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      placeName = "現在地";
      renderLocStatus();
      reverseGeocode(userLoc.lat, userLoc.lon);
      dataCache = {};
      renderResult();
      ensureTabData(currentTab);
    },
    (err) => {
      statusEl.textContent = "取得できませんでした（" + (err.message || "許可されていません") + "）。下の都市から選ぶか、座標を直接指定してください。";
    },
    { timeout: 10000, enableHighAccuracy: false }
  );
});

const cityRow = document.getElementById("cityRow");
PRESET_CITIES.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "city-btn";
  btn.textContent = c.label;
  btn.addEventListener("click", () => {
    userLoc = { lat: c.lat, lon: c.lon };
    placeName = c.label;
    [...cityRow.children].forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderLocStatus();
    dataCache = {};
    renderResult();
    ensureTabData(currentTab);
  });
  cityRow.appendChild(btn);
});

document.getElementById("manualBtn").addEventListener("click", () => {
  const lat = parseFloat(document.getElementById("manualLat").value);
  const lon = parseFloat(document.getElementById("manualLon").value);
  if (Number.isNaN(lat) || Number.isNaN(lon)) return;
  userLoc = { lat, lon };
  placeName = `緯度${lat.toFixed(2)}, 経度${lon.toFixed(2)}`;
  renderLocStatus();
  dataCache = {};
  renderResult();
  ensureTabData(currentTab);
});

function setYearsBack(n){
  if (n === yearsBack) return;
  yearsBack = n;
  document.getElementById("years5").classList.toggle("active", n === 5);
  document.getElementById("years10").classList.toggle("active", n === 10);
  dataCache = {};
  renderResult();
  ensureTabData(currentTab);
}
document.getElementById("years5").addEventListener("click", () => setYearsBack(5));
document.getElementById("years10").addEventListener("click", () => setYearsBack(10));

function renderCalendar(){
  document.getElementById("calTitle").textContent = `${currentYear}年 ${MONTHS_JA[viewMonth]}`;
  document.getElementById("prevMonth").disabled = viewMonth === 0;
  document.getElementById("nextMonth").disabled = viewMonth === 11;

  const weekRow = document.getElementById("weekRow");
  weekRow.innerHTML = "";
  WEEKDAYS.forEach((w,i) => {
    const d = document.createElement("div");
    d.className = "week-label";
    d.textContent = w;
    if (i===0) d.style.color = "#C0684F";
    if (i===6) d.style.color = FROST;
    weekRow.appendChild(d);
  });

  const dayGrid = document.getElementById("dayGrid");
  dayGrid.innerHTML = "";
  const dim = daysInMonth(currentYear, viewMonth);
  const firstWeekday = new Date(currentYear, viewMonth, 1).getDay();
  for (let i=0; i<firstWeekday; i++) dayGrid.appendChild(document.createElement("div"));
  for (let d=1; d<=dim; d++){
    const btn = document.createElement("button");
    btn.className = "day-cell";
    btn.textContent = d;
    if (d === today.getDate() && viewMonth === today.getMonth()) btn.classList.add("today");
    if (d === selectedDay) btn.classList.add("selected");
    btn.addEventListener("click", () => { selectedDay = d; dataCache = {}; renderCalendar(); renderResult(); ensureTabData(currentTab); });
    dayGrid.appendChild(btn);
  }
}
document.getElementById("prevMonth").addEventListener("click", () => { if(viewMonth>0){ viewMonth--; selectedDay=null; dataCache={}; renderCalendar(); renderResult(); } });
document.getElementById("nextMonth").addEventListener("click", () => { if(viewMonth<11){ viewMonth++; selectedDay=null; dataCache={}; renderCalendar(); renderResult(); } });

function tabBarHtml(){
  const tabs = [["day","日ごと"], ["week","週平均"], ["month","月平均"]];
  const btns = tabs.map(([id,label]) =>
    `<button class="tab-btn${currentTab===id?" active":""}" onclick="selectTab('${id}')">${label}</button>`
  ).join("");
  return `<div class="tab-row">${btns}</div>`;
}

function periodLabel(){
  if (currentTab === "day") {
    return { title: `${MONTHS_JA[viewMonth]}${selectedDay}日`, sub: `の気温くらべ · ${placeName}` };
  }
  if (currentTab === "week") {
    const { startObj, endObj } = weekRangeFor(currentYear, viewMonth, selectedDay);
    const fmt = (d) => `${d.getMonth()+1}/${d.getDate()}`;
    return { title: `${fmt(startObj)}〜${fmt(endObj)}`, sub: `の週平均 · ${placeName}` };
  }
  return { title: `${MONTHS_JA[viewMonth]}`, sub: `の月平均 · ${placeName}` };
}

function buildResultBody(records){
  const available = records.filter(r => r.available);
  const means = available.map(r => r.mean);
  const dMin = means.length ? Math.min(...means) - 3 : -5;
  const dMax = means.length ? Math.max(...means) + 3 : 30;
  const baseline = means.length ? means.reduce((a,b)=>a+b,0) / means.length : null;

  const sortedDesc = [...records].sort((a,b) => b.year - a.year);
  let legendHtml = "";
  sortedDesc.forEach(r => {
    const swatch = r.available ? tempToColor(r.mean, dMin, dMax) : "#2C3441";
    const label = r.year + (r.year===currentYear ? "（今年）" : "");
    if (r.available){
      const diff = baseline != null ? r.mean - baseline : null;
      const diffText = diff == null ? "" : (diff >= 0 ? `+${diff.toFixed(1)}°` : `${diff.toFixed(1)}°`);
      const diffColor = diff == null ? MUTED : (diff >= 0.05 ? EMBER : (diff <= -0.05 ? FROST : MUTED));
      const precipText = r.precip != null ? `降水量 ${r.precip.toFixed(0)}mm` : "降水量 データなし";
      const humidText = r.humidity != null ? `湿度 ${r.humidity.toFixed(0)}%` : "湿度 データなし";
      legendHtml += `
        <div class="legend-row">
          <div class="legend-row-main">
            <span class="legend-swatch" style="background:${swatch}"></span>
            <span class="legend-year">${label}</span>
            <span class="legend-vals">最高 ${r.max.toFixed(1)}° / 平均 ${r.mean.toFixed(1)}° / 最低 ${r.min.toFixed(1)}°</span>
            <span class="legend-diff" style="color:${diffColor}">平年比 ${diffText}</span>
          </div>
          <div class="legend-sub">${precipText} ・ ${humidText}</div>
        </div>`;
    } else {
      legendHtml += `
        <div class="legend-row">
          <div class="legend-row-main">
            <span class="legend-swatch" style="background:${swatch}"></span>
            <span class="legend-year">${label}</span>
            <span class="legend-unavail">${r.reason==="future" ? "未来の期間です" : "データ取得不可"}</span>
          </div>
        </div>`;
    }
  });
  const baselineNote = baseline != null
    ? `<p class="baseline-note">平年値(表示中の${records.length}年平均): ${baseline.toFixed(1)}°C — 各年の「平年比」はここからの差です</p>`
    : "";

  let chartHtml = "";
  if (available.length > 0){
    const w = 280, h = 180, padL = 34, padR = 10, padB = 22, padT = 14;
    const allVals = available.flatMap(r => [r.max, r.min]);
    const yMax = Math.ceil(Math.max(...allVals)/5)*5 + 2;
    const yMin = Math.floor(Math.min(...allVals)/5)*5 - 2;
    const chartW = w - padL - padR, chartH = h - padB - padT;
    const n = records.length;
    const xScale = (i) => padL + (n === 1 ? chartW/2 : (i/(n-1)) * chartW);
    const yScale = (v) => padT + chartH - ((v - yMin) / (yMax - yMin)) * chartH;

    let gridLines = "";
    for (let gv = Math.ceil(yMin/10)*10; gv <= yMax; gv += 10){
      const y = yScale(gv);
      gridLines += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="${LINE}" stroke-dasharray="2 4" />`;
      gridLines += `<text x="${padL-6}" y="${y+3}" text-anchor="end" fill="${MUTED}" font-size="9" font-family="Inter">${gv}°</text>`;
    }

    function buildLine(key, color){
      const pts = [];
      records.forEach((r,i) => { if (r.available) pts.push([xScale(i), yScale(r[key])]); });
      if (pts.length === 0) return "";
      const path = pts.map((p,i) => (i===0?"M":"L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
      let dots = "";
      pts.forEach(p => { dots += `<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}" />`; });
      return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />${dots}`;
    }

    const lines = buildLine("max", EMBER) + buildLine("mean", TAN) + buildLine("min", FROST);

    let xLabels = "";
    const yearFontSize = n > 6 ? 8.5 : 10;
    records.forEach((r,i) => {
      const label = n > 6 ? `'${String(r.year).slice(2)}` : r.year;
      xLabels += `<text x="${xScale(i)}" y="${h-4}" text-anchor="middle" fill="${MUTED}" font-size="${yearFontSize}" font-family="Inter">${label}</text>`;
    });

    chartHtml = `
      <div class="chart-wrap">
        <svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${gridLines}${lines}${xLabels}</svg>
        <div class="bar-legend">
          <span><i style="background:${EMBER}"></i>最高</span>
          <span><i style="background:${TAN}"></i>平均</span>
          <span><i style="background:${FROST}"></i>最低</span>
        </div>
      </div>`;
  }

  const { title, sub } = periodLabel();
  return `
    <div class="result-header">
      <span class="result-date">${title}</span>
      <span class="result-sub">${sub}</span>
    </div>
    ${baselineNote}
    <div class="legend">${legendHtml}</div>
    ${chartHtml}
  `;
}

function renderResult(){
  const card = document.getElementById("resultCard");
  if (selectedDay == null){
    card.innerHTML = `<div class="placeholder"><div class="placeholder-ring"></div><p class="placeholder-text">左のカレンダーから日付を選ぶと、<br>気温の比較が表示されます。</p></div>`;
    return;
  }
  if (!userLoc){
    card.innerHTML = `<div class="placeholder"><p class="placeholder-text">地点がまだ設定されていません。<br>上の「📍 現在地を使う」か、都市ボタンを押してください。</p></div>`;
    return;
  }
  const cached = dataCache[currentTab];
  if (cached === undefined || cached === "loading"){
    card.innerHTML = tabBarHtml() + `<div class="placeholder"><p class="placeholder-text">気温を集めています…</p></div>`;
    return;
  }
  card.innerHTML = tabBarHtml() + buildResultBody(cached);
}

window.selectTab = function(tab){
  if (tab === currentTab) return;
  currentTab = tab;
  renderResult();
  ensureTabData(tab);
};

async function ensureTabData(tab){
  if (dataCache[tab] !== undefined) return;
  dataCache[tab] = "loading";
  if (tab === currentTab) renderResult();
  const years = Array.from({length: yearsBack}, (_, i) => currentYear - (yearsBack - 1 - i));
  let results;
  if (tab === "day") {
    results = await Promise.all(years.map(y => getYearRecord(y, viewMonth, selectedDay, userLoc.lat, userLoc.lon)));
  } else if (tab === "week") {
    results = await Promise.all(years.map(y => {
      const { start, end } = weekRangeFor(y, viewMonth, selectedDay);
      return getRangeRecord(y, start, end, userLoc.lat, userLoc.lon);
    }));
  } else {
    results = await Promise.all(years.map(y => {
      const { start, end } = monthRangeFor(y, viewMonth);
      return getRangeRecord(y, start, end, userLoc.lat, userLoc.lon);
    }));
  }
  dataCache[tab] = results;
  if (tab === currentTab) renderResult();
}

renderCalendar();
renderResult();
renderLocStatus();
</script>
